apiVersion: v1
kind: Service
metadata:
  name: learn-api
  labels:
    component: learn-api
    tier: backend
spec:
  # Node port is necessary for kind extraPortMappings to work
  type: NodePort
  selector:
    component: learn-api
    tier: backend
  ports:
    - port: 4051
      targetPort: 4051
      nodePort: 30000
